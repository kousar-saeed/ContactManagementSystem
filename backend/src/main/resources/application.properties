# --- Server ---
server.port=8080

# --- Datasource (placeholders; set via env/secret files) ---
spring.datasource.url=${DB_URL:your-db-url}
spring.datasource.username=${DB_USERNAME:your-db-username}
spring.datasource.password=${DB_PASSWORD:your-db-password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- Security (placeholder) ---
jwt.secret=${JWT_SECRET:your-secret}

