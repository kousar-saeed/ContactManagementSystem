# --- Server ---
server.port=8080

# --- Datasource (SQL Server) ---
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=cms;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:your-db-password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true

# --- Security (placeholder) ---
jwt.secret=${JWT_SECRET:your-secret}

# JWT expiry (ms)
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

